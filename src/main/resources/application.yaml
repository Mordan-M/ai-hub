spring:
  application:
    name: ai-hub
  threads:
    virtual:
      enabled: true

  # MyBatis-Plus Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/<database_name>?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: <username>
    password: <password>
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

server:
  port: 9090

logging:
  level:
    org.springframework.boot.web: DEBUG
    dev:
      langchain4j: DEBUG

langchain4j:
  open-ai:
    chat-model:
      base-url: <base_url>
      api-key: <api_key>
      model-name: <model_name>
      temperature: 0.7
      max-tokens: 32768
      log-requests: true
      log-responses: true
      connect-timeout: 60000
      read-timeout: 600000
    streaming-chat-model:
      base-url: <base_url>
      api-key: <api_key>
      model-name: <model_name>
      temperature: 0.7
      max-tokens: 32768
      log-requests: true
      log-responses: true
      connect-timeout: 60000
      read-timeout: 600000
  community:
    dashscope:
      embedding-model:
        model-name: text-embedding-v4
        api-key: <dashscope_api_key>

mcp:
  filesystem:
    root-dirs:
      - "<your_local_directory>"
    server-version: "0.6.2"
    initialization-timeout: 30
    tool-execution-timeout: 60

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT Configuration
jwt:
  secret: <your_jwt_secret_key_here>
  expiration: 86400000

# Low-code Platform Configuration
app:
  storage:
    root: ./storage
  deploy:
    port: 4567
    base-url: http://localhost:4567
  generation:
    max-concurrent-tasks-per-user: 2
    max-retry: 3

